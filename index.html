<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Conselho Digital - PEI Manoel Ignácio da Silva</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d6efd, #1e3c72);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
    }

    .brand-header {
      text-align: center;
      color: white;
      margin-bottom: 25px;
    }

    .brand-header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .brand-header h2 {
      font-size: 2rem;
      font-weight: 700;
    }

    .login-card {
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
      background: white;
    }

    .btn-primary {
      font-weight: 600;
      padding: 8px;
    }

    .form-control:focus {
      box-shadow: 0 0 0 0.2rem rgba(13,110,253,.25);
    }

    .footer-text {
      text-align: center;
      color: rgba(255,255,255,0.8);
      margin-top: 20px;
      font-size: 0.85rem;
    }

  </style>
</head>
<body>

  <div class="login-wrapper">

    <div class="brand-header">
      <h1>PEI Manoel Ignácio da Silva</h1>
      <h2>Conselho Digital</h2>
    </div>

    <div class="login-card">

      <h5 class="text-center mb-4">Acesso ao Sistema</h5>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input type="email" id="email" class="form-control" required>
        </div>

        <div class="mb-3">
		  <label class="form-label">Senha</label>
		  <div class="input-group">
			<input type="password" id="password" class="form-control" required>
			<button type="button" class="btn btn-outline-secondary" id="toggleSenha">
			  👁
			</button>
		  </div>
		</div>

        <button type="submit" class="btn btn-primary w-100">
          Entrar
        </button>
      </form>

      <div id="loginError" class="text-danger mt-3 text-center small"></div>

    </div>

    <div class="footer-text">
      Sistema interno • Uso exclusivo da equipe escolar
    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>

  <script>
	  // Mostrar / ocultar senha
	  document.getElementById("toggleSenha").addEventListener("click", function() {
		const senhaInput = document.getElementById("password");
		senhaInput.type = senhaInput.type === "password" ? "text" : "password";
	  });

	  // Interceptar submit e chamar login() do auth.js
	  document.getElementById("loginForm").addEventListener("submit", async (e) => {
		e.preventDefault();
		await login();
	  });
	</script>

</body>
</html>
