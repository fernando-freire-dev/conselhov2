<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Importar Mapão</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <style>
    .tabela-previa {
      font-size: 0.82rem;
    }
    .tabela-previa th {
      white-space: nowrap;
      background-color: #1e3c72;
      color: white;
      text-align: center;
      vertical-align: middle;
    }
    .tabela-previa th.col-aluno-header {
      text-align: left;
      min-width: 220px;
    }
    .tabela-previa td {
      text-align: center;
      vertical-align: middle;
    }
    .tabela-previa td.col-aluno {
      text-align: left;
      font-weight: 500;
    }
    .tabela-previa td.col-chamada {
      width: 40px;
      color: #666;
    }
    .cell-vazio {
      color: #ccc;
    }
    .cell-ok {
      color: #198754;
      font-weight: 600;
    }
    .badge-disc {
      font-size: 0.7rem;
      background: #e8f0fe;
      color: #1e3c72;
      border-radius: 4px;
      padding: 1px 5px;
    }
    #areaPrevia {
      display: none;
    }
    #areaUpload .upload-box {
      border: 2px dashed #1e3c72;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    #areaUpload .upload-box:hover {
      background: #f0f4ff;
    }
  </style>
</head>

<body class="app-body">
<nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top">
  <div class="container-fluid">
    <a class="navbar-brand d-flex flex-column lh-1" href="dashboard.html">
      <span class="brand-school">PEI Manoel Ignácio da Silva</span>
      <span class="brand-system">Conselho de Classe</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#appNavbar"
      aria-controls="appNavbar" aria-expanded="false" aria-label="Alternar navegação">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="appNavbar">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        <li class="nav-item" data-role="professor,coordenacao">
          <a class="nav-link" href="conselho.html">Conselho</a>
        </li>
        <li class="nav-item" data-role="admin">
          <a class="nav-link" href="admin.html">Admin</a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-2">
        <span class="navbar-text small d-none d-md-inline" id="navUserLabel"></span>
        <button class="btn btn-outline-light btn-sm" onclick="abrirModalSenha()" type="button">🔑 Senha</button>
        <button class="btn btn-outline-light btn-sm" id="btnLogout" type="button">Sair</button>
      </div>
    </div>
  </div>
</nav>

<main class="container-fluid py-4">
  <div class="app-page-title">
    <h2>📥 Importar Mapão</h2>
  </div>
  <div class="app-card p-4">

    <!-- ── Área de Upload ─────────────────────────────── -->
    <div id="areaUpload">
      <div class="card p-4 mb-4">
        <h5 class="mb-3">Selecione o bimestre e o arquivo do Mapão</h5>
        <p id="subtituloTurma" class="text-muted small mb-3"></p>

        <div class="row g-3 align-items-end">
          <!-- Select de turma: visível apenas para coordenação (injetado via JS) -->
          <div id="containerSelectTurma" style="display:none;" class="col-12"></div>

          <div class="col-md-3">
            <label class="form-label">Bimestre</label>
            <select id="bimestreSelect" class="form-select">
              <option value="1">1º Bimestre</option>
              <option value="2">2º Bimestre</option>
              <option value="3">3º Bimestre</option>
              <option value="4">4º Bimestre</option>
            </select>
          </div>
        </div>

        <div class="upload-box mt-4" onclick="document.getElementById('inputMapao').click()">
          <div class="mb-2" style="font-size:2.5rem;">📄</div>
          <p class="mb-1 fw-semibold text-primary">Clique para selecionar o arquivo</p>
          <p class="text-muted small mb-0">Formatos aceitos: .xlsx, .xls</p>
          <input type="file" id="inputMapao" accept=".xlsx,.xls" class="d-none">
        </div>

        <div id="feedbackUpload" class="mt-3"></div>
      </div>
    </div>

    <!-- ── Prévia da Importação ───────────────────────── -->
    <div id="areaPrevia">
      <div class="card p-4 mb-3">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
          <div>
            <h5 class="mb-0" id="tituloPrevia"></h5>
            <small class="text-muted" id="subtituloPrevia"></small>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary" onclick="voltarUpload()">
              ← Trocar arquivo
            </button>
            <button class="btn btn-success" id="btnSalvar" onclick="salvarTudo()">
              <span id="btnSalvarTexto">💾 Salvar Tudo</span>
              <span id="btnSalvarSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
            </button>
          </div>
        </div>
      </div>

      <div class="card p-3">
        <div id="legendaImportacao" class="mb-2 d-flex gap-3 flex-wrap small text-muted"></div>
        <div class="table-responsive">
          <table class="table table-bordered table-hover tabela-previa" id="tabelaPrevia">
            <thead id="cabecalhoPrevia"></thead>
            <tbody id="corpoPrevia"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/util.js"></script>
<script src="js/importar-mapao.js"></script>
<script src="js/modals.js"></script>
</body>
</html>
