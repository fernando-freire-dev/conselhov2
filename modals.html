<!-- ============================================================
     modals.html — Modais globais do sistema
     Carregado automaticamente por js/modals.js em todas as páginas.
     Para adicionar um novo modal: basta incluir aqui e criar
     as funções correspondentes em js/modals.js.
     ============================================================ -->


<!-- ── Modal: Alterar Senha ──────────────────────────────────── -->
<div class="modal fade" id="modalAlterarSenha" tabindex="-1" aria-labelledby="modalSenhaLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalSenhaLabel">🔑 Alterar Senha</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Senha atual</label>
          <div class="input-group">
            <input type="password" id="senhaAtual" class="form-control" placeholder="Digite sua senha atual">
            <button class="btn btn-outline-secondary" type="button" onclick="toggleSenhaModal('senhaAtual')">👁</button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Nova senha</label>
          <div class="input-group">
            <input type="password" id="senhaNova" class="form-control" placeholder="Mínimo 6 caracteres">
            <button class="btn btn-outline-secondary" type="button" onclick="toggleSenhaModal('senhaNova')">👁</button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmar nova senha</label>
          <div class="input-group">
            <input type="password" id="senhaNovaConfirm" class="form-control" placeholder="Repita a nova senha">
            <button class="btn btn-outline-secondary" type="button" onclick="toggleSenhaModal('senhaNovaConfirm')">👁</button>
          </div>
        </div>
        <div id="feedbackSenha"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btnSalvarSenha" onclick="salvarNovaSenha()">
          <span id="btnSalvarSenhaTexto">Salvar</span>
          <span id="btnSalvarSenhaSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
        </button>
      </div>
    </div>
  </div>
</div>


<!-- ── Modal: Editar Vínculo Professor Representante ─────────── -->
<div class="modal fade" id="modalEditar" tabindex="-1" aria-labelledby="modalEditarLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalEditarLabel">Editar Vínculo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p><strong>Turma:</strong> <span id="modalTurma"></span></p>
        <p><strong>Professor atual:</strong> <span id="modalProfessorAtual"></span></p>
        <div class="mb-3">
          <label class="form-label">Novo Professor</label>
          <select id="modalSelectProfessor" class="form-select"></select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" onclick="fecharModal()">Cancelar</button>
        <button type="button" class="btn btn-success" onclick="salvarEdicao()">Salvar</button>
      </div>
    </div>
  </div>
</div>


<!-- ── Modal: Notas do Aluno (Conselho) ──────────────────────── -->
<div class="modal fade" id="modalNotas" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">

      <div class="modal-header">
        <h5 class="modal-title" id="modalNotasTitulo">Notas</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>

      <div class="modal-body" id="modalNotasCorpo">

<!-- ── Modal: Novo Aluno ──────────────────────────────────────── -->
<div class="modal fade" id="modalNovoAluno" tabindex="-1" aria-labelledby="modalNovoAlunoLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalNovoAlunoLabel">➕ Novo Aluno</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">

        <!-- Linha 1: Turma -->
        <div class="mb-3">
          <label class="form-label">Turma</label>
          <select id="novoAlunoTurma" class="form-select">
            <option value="">Selecione a turma...</option>
          </select>
        </div>

        <!-- Linha 2: Nº Chamada | Nome -->
        <div class="row g-2 mb-3">
          <div class="col-md-3">
            <label class="form-label">Nº Chamada</label>
            <input type="number" id="novoAlunoNumeroChamada" class="form-control" min="1" placeholder="Ex: 15">
          </div>
          <div class="col-md-9">
            <label class="form-label">Nome do Aluno</label>
            <input type="text" id="novoAlunoNome" class="form-control" placeholder="Nome completo">
          </div>
        </div>

        <!-- Linha 3: RA -->
        <div class="mb-3">
          <label class="form-label">RA</label>
          <input type="text" id="novoAlunoRA" class="form-control" placeholder="Ex: 1234567">
        </div>

        <div id="feedbackNovoAluno" class="mt-3"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btnSalvarNovoAluno" onclick="salvarNovoAluno()">
          <span id="btnSalvarNovoAlunoTexto">Salvar</span>
          <span id="btnSalvarNovoAlunoSpinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Modal para listar as disciplinas vinculadas a uma turma, vai funcionar ao apertar o botão "Disciplinas" no menu turmas ──────── -->
<div class="modal fade" id="modalDisciplinasTurma" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">📚 Disciplinas: <span id="nomeTurmaModal" class="text-primary"></span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h6 class="m-0">Disciplinas Cadastradas</h6>
          <span class="badge bg-primary" id="totalDisciplinasBadge">0</span>
        </div>

        <div class="table-responsive border rounded" style="max-height: 350px;">
          <table class="table table-sm table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>Nome da Disciplina</th>
                <th class="text-end">Ação</th>
              </tr>
            </thead>
            <tbody id="listaDisciplinasCorpo">
              </tbody>
          </table>
        </div>

        <div class="row g-2 mb-4 align-items-end">
          <div class="col">
            <label class="form-label small fw-bold">Vincular Nova Disciplina</label>
            <select id="selectNovaDisciplina" class="form-select">
              <option value="">Carregando disciplinas...</option>
            </select>
          </div>
          <div class="col-auto">
            <button class="btn btn-success" onclick="vincularNovaDisciplina()">
              <i class="bi bi-plus-lg"></i> Adicionar
            </button>
           </div>
          </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Modal do Conselho para substituir a tabela atual, assim teremos foco no aluno na hora do conselho ──────── -->

<div class="modal fade" id="modalConselhoAluno" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 id="modalAlunoTitulo" class="modal-title"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <!-- DIFICULDADE -->
        <div class="mb-4">
            <label class="fw-semibold d-block mb-2">Tem dificuldade?</label>
          
            <div class="d-flex gap-4 mb-2">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="modalDificuldade" id="modalDificuldadeNao" value="false" checked>
                <label class="form-check-label" for="modalDificuldadeNao">Não</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="modalDificuldade" id="modalDificuldadeSim" value="true">
                <label class="form-check-label" for="modalDificuldadeSim">Sim</label>
              </div>
            </div>
          
            <div id="modalDificuldadeArea" class="d-none">
              <div class="d-flex flex-wrap gap-2 align-items-center mb-2">
                <button type="button" class="btn btn-outline-primary btn-sm" id="btnSelecionarDificuldade">
                  Selecionar disciplinas
                </button>
                <span class="text-muted small" id="resumoDificuldade">Nenhuma disciplina selecionada</span>
              </div>
            </div>
          </div>

        <!-- ATIVIDADE EM SALA -->
        <div class="mb-4">
            <label class="fw-semibold d-block mb-2">Faz atividade em sala?</label>
          
            <div class="d-flex gap-4 mb-2">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="modalFazSala" id="modalFazSalaSim" value="true" checked>
                <label class="form-check-label" for="modalFazSalaSim">Sim</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="modalFazSala" id="modalFazSalaNao" value="false">
                <label class="form-check-label" for="modalFazSalaNao">Não</label>
              </div>
            </div>
          
            <div id="modalSalaArea" class="d-none">
              <div class="d-flex flex-wrap gap-2 align-items-center mb-2">
                <button type="button" class="btn btn-outline-primary btn-sm" id="btnSelecionarSala">
                  Selecionar disciplinas
                </button>
                <span class="text-muted small" id="resumoSala">Nenhuma disciplina selecionada</span>
              </div>
            </div>
          </div>

        <!-- PLATAFORMAS -->
        <div class="mb-4">
            <label class="fw-semibold d-block mb-2">Faz plataformas?</label>
          
            <div class="d-flex gap-4 mb-2">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="modalFazPlataforma" id="modalFazPlataformaSim" value="true" checked>
                <label class="form-check-label" for="modalFazPlataformaSim">Sim</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="modalFazPlataforma" id="modalFazPlataformaNao" value="false">
                <label class="form-check-label" for="modalFazPlataformaNao">Não</label>
              </div>
            </div>
          
            <div id="modalPlataformaArea" class="d-none">
              <div class="d-flex flex-wrap gap-2 align-items-center mb-2">
                <button type="button" class="btn btn-outline-primary btn-sm" id="btnSelecionarPlataforma">
                  Selecionar disciplinas
                </button>
                <span class="text-muted small" id="resumoPlataforma">Nenhuma disciplina selecionada</span>
              </div>
            </div>
          </div>

        <!-- INDISCIPLINA -->
        <div class="mb-4">
          <label class="fw-semibold d-block mb-2">Apresenta indisciplina?</label>

          <div class="d-flex gap-4 mb-2">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="modalIndisciplina" id="modalIndisciplinaNao" value="false" checked>
              <label class="form-check-label" for="modalIndisciplinaNao">Não</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="modalIndisciplina" id="modalIndisciplinaSim" value="true">
              <label class="form-check-label" for="modalIndisciplinaSim">Sim</label>
            </div>
          </div>

          <div id="modalIndisciplinaArea" class="d-none">
            <textarea id="modalIndisciplinaTxt" class="form-control" rows="3"
              placeholder="Descreva a indisciplina"></textarea>
          </div>
        </div>

        <!-- PROFICIÊNCIA -->
        <div class="mb-4">
          <label class="fw-semibold">Proficiência</label>
          <div class="small text-muted mt-1" id="textoProficienciaAnterior">
            Proficiência no conselho anterior: -
          </div>
          <select id="modalProficiencia" class="form-select">
            <option value="">Selecione</option>
            <option value="Abaixo do Básico">Abaixo do Básico</option>
            <option value="Básico">Básico</option>
            <option value="Proficiente">Proficiente</option>
          </select>
        </div>

      </div>

     <div class="modal-footer flex-column gap-3">

       <!-- Navegação -->
       <div class="d-flex justify-content-center gap-3">
         <button class="btn btn-outline-primary d-flex align-items-center gap-2 px-4" id="btnAnterior" type="button">
           ⬅️ Anterior
         </button>
     
         <button class="btn btn-outline-primary d-flex align-items-center gap-2 px-4" id="btnProximo" type="button">
           Próximo ➡️
         </button>
       </div>
     
       <!-- Salvar -->
       <div class="d-flex justify-content-center">
         <button class="btn btn-success px-5 fw-semibold" id="btnSalvarAluno" type="button">
           ✔️ Salvar aluno
         </button>
       </div>
     
     </div>

    </div>
  </div>
</div>

<!-- ── Adicione novos modais globais abaixo desta linha ──────── -->
